<!-- reports/templates/reports/report_form.html (Simplified version for direct access) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - ServiceWatch SA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .report-card {
            background: white;
            border-radius: 30px;
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333; }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="report-card">
        <h1><i class="fas fa-clipboard-list"></i> Report an Issue</h1>
        <form id="reportForm">
            <div class="form-group">
                <label>Your Name *</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Category *</label>
                <select id="category" required>
                    <option value="water">💧 Water Leak</option>
                    <option value="electricity">⚡ Electricity Fault</option>
                    <option value="pothole">🕳️ Pothole</option>
                    <option value="waste">🗑️ Waste Collection</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description *</label>
                <textarea id="description" rows="4" required></textarea>
            </div>
            <button type="submit">Submit Report</button>
        </form>
        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>
    <script>
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                reporter_name: document.getElementById('name').value,
                reporter_email: document.getElementById('email').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                latitude: null, longitude: null, address: ''
            };
            
            const response = await fetch('/api/submit-report/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.success) {
                alert(`Report submitted! Reference: ${result.reference}`);
                window.location.href = '/';
            } else {
                alert('Error: ' + result.error);
            }
        });
    </script>
</body>
</html>
